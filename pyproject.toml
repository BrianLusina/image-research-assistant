[project]
name = "image-research-assistant"
version = "0.1.0"
description = "A multimodal image research AI assistant"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "dotenv>=0.9.9",
    "google-genai>=1.75.0",
    "gradio>=6.14.0",
    "langchain>=1.2.18",
    "langchain-google-genai>=4.2.2",
    "langchain-mcp-adapters>=0.1.14",
    "langgraph>=1.1.10",
    "mcp>=1.27.1",
    "uvicorn>=0.47.0",
    "wikipedia>=1.4.0",
]

[dependency-groups]
lint = [
    "pyrefly>=0.64.1",
    "ruff>=0.15.12",
]
