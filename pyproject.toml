[project]
name = "image-research-assistant"
version = "0.1.0"
description = "A multimodal image research AI assistant"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "dotenv>=0.9.9",
    "google-genai>=1.73.1",
    "gradio>=6.12.0",
    "langchain>=1.1.0",
    "langchain-google-genai>=4.2.2",
    "langchain-mcp-adapters>=0.1.14",
    "langgraph>=1.1.9",
    "mcp>=1.22.0",
    "uvicorn>=0.44.0",
    "wikipedia>=1.4.0",
]

[dependency-groups]
lint = [
    "pyrefly>=0.61.1",
    "ruff>=0.15.11",
]
